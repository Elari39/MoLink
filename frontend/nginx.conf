# 墨链 MoLink 前端 nginx 配置：静态托管 + 后端反向代理
map $http_x_forwarded_proto $molink_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_host $molink_forwarded_host {
    default $http_x_forwarded_host;
    ""      $http_host;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 压缩静态资源
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 1) 管理接口反代到后端
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $molink_forwarded_host;
        proxy_set_header   X-Forwarded-Proto $molink_forwarded_proto;
    }

    # 2) 前端顶层路由：这些路径虽然可能是纯字母，但应由 SPA 接管
    location = /features { try_files $uri /index.html; }
    location = /pricing { try_files $uri /index.html; }
    location = /api-docs { try_files $uri /index.html; }
    location = /about { try_files $uri /index.html; }
    location = /stats { try_files $uri /index.html; }
    location ^~ /stats/ { try_files $uri /index.html; }

    # 3) 短码跳转反代到后端：匹配根路径下纯字母数字（无点、无多级路径）的请求
    #    如 /1000、/myLink；静态资源（含点或多级路径）不会命中此规则
    location ~ ^/[A-Za-z0-9]+$ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $molink_forwarded_host;
        proxy_set_header   X-Forwarded-Proto $molink_forwarded_proto;
    }

    # 4) 其余请求作为单页应用处理：优先命中静态文件，否则回退首页
    location / {
        try_files $uri $uri/ /index.html;
    }
}
