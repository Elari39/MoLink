# 墨链 MoLink 1Panel 编排：使用远程 MySQL / Redis，仅启动后端与前端 nginx
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: molink-backend
    environment:
      APP_REMOTE_STORAGE_ENABLED: ${APP_REMOTE_STORAGE_ENABLED:-true}
      APP_DATABASE_DSN: ${APP_DATABASE_DSN}
      APP_DATABASE_MAX_OPEN_CONNS: ${APP_DATABASE_MAX_OPEN_CONNS:-20}
      APP_DATABASE_MAX_IDLE_CONNS: ${APP_DATABASE_MAX_IDLE_CONNS:-10}
      APP_REDIS_ADDR: ${APP_REDIS_ADDR}
      APP_REDIS_PASSWORD: ${APP_REDIS_PASSWORD:-}
      APP_REDIS_DB: ${APP_REDIS_DB:-0}
      APP_BASE_URL: ${APP_BASE_URL:-}
      MYSQL_HOST: ${MYSQL_HOST:-localhost}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DB: ${MYSQL_DB:-shortlink}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    expose:
      - "8080"
    networks:
      - molink

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: molink-frontend
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8763}:80"
    networks:
      - molink

networks:
  molink:
    driver: bridge
